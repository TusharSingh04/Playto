# Render Blueprint — FREE TIER variant.
#
# Render's free plan does not include Background Workers or Cron Jobs, so
# this Blueprint provisions only what the free tier supports:
#   - playto-postgres   managed Postgres 16 (free 30 days, then $6/mo)
#   - playto-redis      managed Key Value (used for ratelimit cache only —
#                       no Celery broker since there's no worker to consume)
#   - playto-api        gunicorn web service
#   - playto-frontend   static site (Vite build, /api/* rewrite to api)
#
# Payout processing is driven by an EXTERNAL free cron pinger (cron-job.org
# or similar) that hits POST /api/v1/_internal/cron/sweep/ every 60s with
# the X-Cron-Secret header. See README → "Free-tier processing setup".
#
# Steps in dashboard:
#   1. New + → Blueprint → connect Playto repo → Apply.
#   2. Fill the secrets marked `sync: false` below.
#   3. After first deploy, open cron-job.org and create a job that POSTs
#      https://playto-api.onrender.com/api/v1/_internal/cron/sweep/
#      with header `X-Cron-Secret: <the same value you put in CRON_SECRET>`.
#
# When/if you upgrade to a paid plan, set PAYOUT_USE_CELERY=True and add
# the playto-worker service back (see git history for the worker-enabled
# variant).

databases:
  - name: playto-postgres
    plan: free
    databaseName: playto_payouts
    user: playto
    postgresMajorVersion: 16

services:
  # ── Redis / Key Value (ratelimit cache only — Celery is disabled here) ──
  - type: keyvalue
    name: playto-redis
    plan: free
    ipAllowList: []   # private only

  # ── Django web (gunicorn) ────────────────────────────────────────────────
  - type: web
    name: playto-api
    runtime: python
    plan: free
    buildCommand: "./backend/build.sh"
    startCommand: "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    healthCheckPath: /api/v1/auth/me/   # 401 is fine — proves Django is up
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false                    # leave blank — auto-filled from RENDER_EXTERNAL_HOSTNAME
      - key: CORS_ALLOWED_ORIGINS
        sync: false                    # https://playto-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        sync: false                    # https://playto-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: playto-postgres
          property: connectionString
      - key: CACHE_URL
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString
      # Celery off on free tier — no worker available to consume the queue.
      - key: PAYOUT_USE_CELERY
        value: "False"
      # Shared secret for the external cron pinger. Generate with:
      # python3 -c "import secrets; print(secrets.token_urlsafe(32))"
      - key: CRON_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: LOG_LEVEL
        value: INFO

  # ── Frontend (Vite static site) ──────────────────────────────────────────
  - type: web
    name: playto-frontend
    runtime: static
    buildCommand: "cd frontend && npm ci && npm run build"
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /api/*
        destination: https://playto-api.onrender.com/api/:splat
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: /api/v1
