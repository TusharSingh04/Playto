# Render Blueprint — defines every service so Render provisions in one click.
#
# Usage:
#   1. Push this file to main on GitHub.
#   2. In Render dashboard → "New +" → "Blueprint" → connect this repo.
#   3. Render reads this file, asks you to fill the secrets marked
#      `sync: false` below, then provisions everything.
#
# What gets created:
#   - playto-postgres        managed Postgres 16 (free tier OK for demo)
#   - playto-redis           managed Key Value (Redis-compatible)
#   - playto-api             gunicorn web service (Django)
#   - playto-worker          Celery worker (background worker)
#   - playto-beat            Celery beat scheduler (background worker)
#   - playto-frontend        Vite build, served as static site
#
# The free tier of web/worker services sleeps after 15 min idle. That's
# fine for a demo; upgrade the instance type below if you need always-on.

databases:
  - name: playto-postgres
    plan: free
    databaseName: playto_payouts
    user: playto
    postgresMajorVersion: 16

services:
  # ── Redis / Key Value (used as Celery broker + ratelimit cache) ─────────
  - type: keyvalue
    name: playto-redis
    plan: free
    ipAllowList: []   # private only — only other Render services can reach it

  # ── Django web (gunicorn) ────────────────────────────────────────────────
  - type: web
    name: playto-api
    runtime: python
    plan: free
    buildCommand: "./backend/build.sh"
    startCommand: "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    healthCheckPath: /api/v1/auth/me/   # 401 is fine — proves Django is up
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: SECRET_KEY
        generateValue: true             # Render generates a strong value once
      - key: ALLOWED_HOSTS
        sync: false                     # filled at first deploy: <name>.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false                     # https://<frontend>.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        sync: false                     # https://<frontend>.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: playto-postgres
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString
      - key: CACHE_URL
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString
      - key: SENTRY_DSN
        sync: false                     # paste in dashboard; safe to leave blank
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: LOG_LEVEL
        value: INFO

  # ── Celery worker ────────────────────────────────────────────────────────
  - type: worker
    name: playto-worker
    runtime: python
    plan: free
    buildCommand: "./backend/build.sh"
    startCommand: "cd backend && celery -A config worker --loglevel=info --concurrency=2"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.12.5"
      - fromGroup: playto-shared        # see envVarGroups below
      - key: DATABASE_URL
        fromDatabase:
          name: playto-postgres
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString
      - key: CACHE_URL
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString

  # ── Celery beat (periodic scheduler) ─────────────────────────────────────
  - type: worker
    name: playto-beat
    runtime: python
    plan: free
    buildCommand: "./backend/build.sh"
    startCommand: "cd backend && celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.12.5"
      - fromGroup: playto-shared
      - key: DATABASE_URL
        fromDatabase:
          name: playto-postgres
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString
      - key: CACHE_URL
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString

  # ── Frontend (Vite static site) ──────────────────────────────────────────
  - type: web
    name: playto-frontend
    runtime: static
    buildCommand: "cd frontend && npm ci && npm run build"
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      # API requests proxied to the Django service so the SPA can call /api/* same-origin
      - type: rewrite
        source: /api/*
        destination: https://playto-api.onrender.com/api/:splat
      # SPA fallback — every other route renders index.html for client-side routing
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: /api/v1   # same-origin via the rewrite above

# ── Shared env vars used by worker + beat (avoid duplication) ───────────────
envVarGroups:
  - name: playto-shared
    envVars:
      - key: SECRET_KEY
        sync: false      # paste the SAME value as playto-api uses
      - key: ALLOWED_HOSTS
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
